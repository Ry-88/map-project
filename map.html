<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>رسم حدود منطقة مكة مع معلومات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
    }
  </style>
</head>

<body>
    <div id="map"></div>

    <div class="logo">
        <h1>🗺️ Saudi Arabia Map</h1>
        <p>Interactive Regional Explorer</p>
    </div>

    <div class="info-panel">
        <div class="info-header">
            <h2>خريطة المملكة العربية السعودية</h2>
            <p>Saudi Arabia Regional Information</p>
        </div>
        <div class="leaflet-pane leaflet-shadow-pane"></div>
        <div class="leaflet-pane leaflet-marker-pane"></div>
        <div class="leaflet-pane leaflet-tooltip-pane"></div>
        <div class="leaflet-pane leaflet-popup-pane">
          <div class="leaflet-popup  leaflet-zoom-animated"
            style="opacity: 1; transform: translate3d(785px, 627px, 0px); bottom: -7px; left: -125px;">
            <div class="leaflet-popup-content-wrapper">
              <div class="leaflet-popup-content" style="width: 203px;">
                <h3>منطقة مكة</h3>
                <p>يمكنك تعديل الحدود بالنقر على Edit في الأعلى.</p>
              </div>
            </div>
            <div class="leaflet-popup-tip-container">
              <div class="leaflet-popup-tip"></div>
            </div><a class="leaflet-popup-close-button" role="button" aria-label="Close popup" href="#close"><span
                aria-hidden="true">×</span></a>
          </div>
        </div>
        <div class="leaflet-proxy leaflet-zoom-animated"
          style="transform: translate3d(318601px, 227155px, 0px) scale(1024);"></div>
      </div>
      <div class="leaflet-control-container">
        <div class="leaflet-top leaflet-left">
          <div class="leaflet-control-zoom leaflet-bar leaflet-control"><a class="leaflet-control-zoom-in" href="#"
              title="Zoom in" role="button" aria-label="Zoom in" aria-disabled="false"><span
                aria-hidden="true">+</span></a><a class="leaflet-control-zoom-out" href="#" title="Zoom out"
              role="button" aria-label="Zoom out" aria-disabled="false"><span aria-hidden="true">−</span></a></div>
          <div class="leaflet-draw leaflet-control">
            <div class="leaflet-draw-section">
              <div class="leaflet-draw-toolbar leaflet-bar leaflet-draw-toolbar-top"><a
                  class="leaflet-draw-draw-polygon" href="#" title="Draw a polygon"><span class="sr-only">Draw a
                    polygon</span></a></div>
              <ul class="leaflet-draw-actions" style="top: 1px; display: none;">
                <li class=""><a class="" href="#" title="Finish drawing">Finish</a></li>
                <li class=""><a class="" href="#" title="Delete last point drawn">Delete last point</a></li>
                <li class=""><a class="" href="#" title="Cancel drawing">Cancel</a></li>
              </ul>
            </div>
            <div class="leaflet-draw-section">
              <div class="leaflet-draw-toolbar leaflet-bar"><a class="leaflet-draw-edit-edit" href="#"
                  title="Edit layers"><span class="sr-only">Edit layers</span></a><a class="leaflet-draw-edit-remove"
                  href="#" title="Delete layers"><span class="sr-only">Delete layers</span></a></div>
              <ul class="leaflet-draw-actions" style="top: 1px; display: none;">
                <li class=""><a class="" href="#" title="Save changes">Save</a></li>
                <li class=""><a class="" href="#" title="Cancel editing, discards all changes">Cancel</a></li>
              </ul>
            </div>
          </div>
        </div>
        <div class="leaflet-top leaflet-right"></div>
        <div class="leaflet-bottom leaflet-left"></div>
        <div class="leaflet-bottom leaflet-right">
          <div class="leaflet-control-attribution leaflet-control"><a href="https://leafletjs.com"
              title="A JavaScript library for interactive maps"><svg aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"
                class="leaflet-attribution-flag">
                <path fill="#4C7BE1" d="M0 0h12v4H0z"></path>
                <path fill="#FFD500" d="M0 4h12v3H0z"></path>
                <path fill="#E0BC00" d="M0 7h12v1H0z"></path>
              </svg> Leaflet</a></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // إعداد الخريطة مركز منطقة مكة
    const map = L.map('map').setView([21.4, 39.8], 9);

    // إضافة الخريطة الأساسية
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
    }).addTo(map);

    // مجموعة لتخزين المناطق المرسومة
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // أدوات الرسم والتحرير
    const drawControl = new L.Control.Draw({
      draw: {
        polygon: {
          allowIntersection: false,
          showArea: true,
          shapeOptions: {
            color: '#ff7800',
            weight: 3,
            fillColor: '#ffb347',
            fillOpacity: 0.5
          }
        },
        polyline: false,
        rectangle: false,
        circle: false,
        marker: false,
        circlemarker: false
      },
      edit: {
        featureGroup: drawnItems,
        remove: true
      }
    });
    map.addControl(drawControl);

    // عند إنشاء شكل جديد
    map.on(L.Draw.Event.CREATED, function (event) {
      const layer = event.layer;

      // أضف اسم افتراضي للمنطقة
      layer.properties = { name: "منطقة مكة" };

      // إضافة النقر لعرض معلومات
      layer.on('click', function () {
        const name = layer.properties.name || "منطقة مجهولة";
        layer.bindPopup(
          `<h3>${name}</h3>
       <p>يمكنك تعديل الحدود بالنقر على Edit في الأعلى.</p>`
        ).openPopup();
      });

      drawnItems.addLayer(layer);

      alert("تم رسم المنطقة! اضغط على الشكل لعرض المعلومات.\nGeoJSON موجود في الكونسول.");
      console.log("GeoJSON:", layer.toGeoJSON());
    });

    // عند تعديل أي شكل
    map.on('draw:edited', function (event) {
      event.layers.eachLayer(function (layer) {
        console.log("GeoJSON بعد التعديل:", layer.toGeoJSON());
      });
    });
  </script>

</body>

</html>
