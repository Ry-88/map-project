  <script>
    // إعداد الخريطة مركز منطقة مكة
    const map = L.map('map').setView([21.4, 39.8], 9);

    // إضافة الخريطة الأساسية
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
    }).addTo(map);

    // مجموعة لتخزين المناطق المرسومة
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // أدوات الرسم والتحرير
    const drawControl = new L.Control.Draw({
      draw: {
        polygon: {
          allowIntersection: false,
          showArea: true,
          shapeOptions: {
            color: '#ff7800',
            weight: 3,
            fillColor: '#ffb347',
            fillOpacity: 0.5
          }
        },
        polyline: false,
        rectangle: false,
        circle: false,
        marker: false,
        circlemarker: false
      },
      edit: {
        featureGroup: drawnItems,
        remove: true
      }
    });
    map.addControl(drawControl);

    // عند إنشاء شكل جديد
    map.on(L.Draw.Event.CREATED, function (event) {
      const layer = event.layer;

      // أضف اسم افتراضي للمنطقة
      layer.properties = { name: "منطقة مكة" };

      // إضافة النقر لعرض معلومات
      layer.on('click', function () {
        const name = layer.properties.name || "منطقة مجهولة";
        layer.bindPopup(
          `<h3>${name}</h3>
       <p>يمكنك تعديل الحدود بالنقر على Edit في الأعلى.</p>`
        ).openPopup();
      });

      drawnItems.addLayer(layer);

      alert("تم رسم المنطقة! اضغط على الشكل لعرض المعلومات.\nGeoJSON موجود في الكونسول.");
      console.log("GeoJSON:", layer.toGeoJSON());
    });

    // عند تعديل أي شكل
    map.on('draw:edited', function (event) {
      event.layers.eachLayer(function (layer) {
        console.log("GeoJSON بعد التعديل:", layer.toGeoJSON());
      });
    });
  </script>
