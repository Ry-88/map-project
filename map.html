<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Arabia Interactive Map - With Accurate Borders</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .info-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .info-header h2 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .info-header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .info-content {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .region-details {
            display: none;
        }

        .region-details.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .region-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
            border-bottom: 3px solid #2a5298;
            padding-bottom: 10px;
        }

        .region-name-ar {
            font-size: 1.5em;
            color: #2a5298;
            margin-bottom: 15px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #2a5298;
        }

        .detail-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .instructions {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .instructions h3 {
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .instructions p {
            font-size: 0.9em;
            opacity: 0.95;
        }

        .legend {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
        }

        .legend h4 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 0.9em;
        }

        .legend-color {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            margin-right: 10px;
            border: 2px solid #333;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .logo h1 {
            font-size: 1.5em;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 0.9em;
            color: #666;
        }

        /* Leaflet popup customization */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .leaflet-popup-content {
            margin: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .popup-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .info-panel {
                width: calc(100% - 40px);
                top: auto;
                bottom: 20px;
                right: 20px;
            }

            .logo {
                position: relative;
                top: 10px;
                left: 10px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="logo">
        <h1>🗺️ Saudi Arabia Map</h1>
        <p>Interactive Regional Explorer</p>
    </div>

    <div class="info-panel">

            <h2>خريطة المملكة العربية السعودية</h2>
            <p>Saudi Arabia Regional Information</p>
        </div>
        <div class="info-content">
            <div class="instructions">
                <h3>📍 How to Use</h3>
                <p>Click on any region on the map to view detailed information</p>
                <p style="margin-top: 5px;">انقر على أي منطقة لعرض المعلومات</p>
            </div>

            <div id="region-info" class="region-details">
                <!-- Region details will be inserted here -->
            </div>

            <div class="legend">
                <h4>Saudi Arabia Regions</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f4f8; border-color: #006ba6;"></div>
                    <span>Default Region</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffeb99; border-color: #ff6600;"></div>
                    <span>Hovered Region</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #90ee90; border-color: #006400;"></div>
                    <span>Selected Region</span>
                </div>
                <!-- <div class="legend-item">
                    <div style="width: 25px; height: 3px; background: #000; margin-right: 10px;"></div>
                    <span>Country Border</span>
                </div> -->
                <!-- <div class="legend-item">
                    <div style="width: 25px; height: 2px; background: #666; margin-right: 10px; border-top: 2px dashed #666;"></div>
                    <span>Region Border</span>
                </div> -->
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>

        const map = L.map('map', {

        // Add tile layer

                    [50.00, 19.50],
                    [50.50, 20.50],
                    [51.00, 22.00],
                    [51.50, 23.50],
                    [51.80, 24.50],
                    [52.00, 25.50],
                    // Arabian Gulf coast (going north)
                    [51.90, 26.50],
                    [51.60, 27.50],
                    [51.00, 28.00],
                    [50.50, 28.30],
                    [50.00, 28.50],
                    [49.50, 28.60],
                    // Kuwait/Iraq border (going west)
                    [48.50, 28.55],
                    [47.70, 28.53],
                    [47.00, 29.00],
                    [46.50, 29.10],
                    [45.50, 29.20],
                    [44.70, 29.30],
                    [44.00, 29.90],

                    [42.80, 30.50],

        // Saudi Arabia regions - ALL properly contained within country border
        const saudiRegionsData = {
            "type": "FeatureCollection",

                    },
                    "geometry": {

                            [51.50, 24.00], [51.00, 22.00], [50.00, 21.00], [49.00, 21.50],

                        ]]
                    }
                },
                {

                {

                    },
                    "geometry": {

                        "coordinates": [[

                            [42.50, 17.50], [42.00, 17.80], [41.50, 18.50], [41.50, 19.50],
                            [41.80, 19.80]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Qassim Region",
                        "nameAr": "منطقة القصيم",
                        "capital": "Buraidah",
                        "capitalAr": "بريدة",
                        "population": "1,423,935",
                        "area": "58,046 km²",
                        "density": "25 per km²",
                        "description": "Agricultural heartland of Saudi Arabia"
                    },
                    "geometry": {

                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Tabuk Region",
                        "nameAr": "منطقة تبوك",
                        "capital": "Tabuk",
                        "capitalAr": "تبوك",
                        "population": "910,030",
                        "area": "146,072 km²",
                        "density": "6 per km²",
                        "description": "Northwestern gateway to Saudi Arabia"
                    },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [35.00, 29.30], [36.50, 29.50], [37.50, 28.80], [38.00, 28.00],
                            [38.00, 27.00], [37.00, 27.00], [36.00, 27.50], [35.30, 28.50],
                            [35.00, 29.30]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Hail Region",
                        "nameAr": "منطقة حائل",
                        "capital": "Hail",
                        "capitalAr": "حائل",
                        "population": "699,774",
                        "area": "103,887 km²",
                        "density": "7 per km²",
                        "description": "Historic region in north-central Arabia"
                    },
                    "geometry": {

                        "coordinates": [[
                            [39.50, 28.50], [42.00, 28.50], [42.50, 27.50], [42.00, 26.50],
                            [41.00, 26.00], [40.00, 26.50], [39.50, 27.50], [39.50, 28.50]
                        ]]
                    }
                },
                {

                    "properties": {

                    },
                    "geometry": {

                            [42.00, 28.50], [40.50, 29.00], [39.50, 30.00], [38.80, 31.00],
                            [38.50, 31.90]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Jazan Region",
                        "nameAr": "منطقة جازان",
                        "capital": "Jazan",
                        "capitalAr": "جازان",
                        "population": "1,603,000",

                    },
                    "geometry": {

                        ]]
                    }
                },
                {

                    "properties": {
                        "name": "Najran Region",
                        "nameAr": "منطقة نجران",
                        "capital": "Najran",
                        "capitalAr": "نجران",
                        "population": "599,000",
                        "area": "149,511 km²",
                        "density": "4 per km²",
                        "description": "Southern border region near Yemen"
                    },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [43.50, 19.50], [48.00, 19.00], [48.50, 18.00], [47.50, 17.20],
                            [45.50, 17.40], [44.50, 17.50], [43.50, 18.00], [43.50, 19.50]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Al-Bahah Region",
                        "nameAr": "منطقة الباحة",
                        "capital": "Al-Bahah",
                        "capitalAr": "الباحة",
                        "population": "476,172",
                        "area": "9,921 km²",
                        "density": "48 per km²",
                        "description": "Mountainous region with moderate climate"
                    },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [40.80, 20.50], [41.50, 20.50], [41.80, 19.80], [41.50, 19.50],
                            [41.00, 19.50], [40.50, 19.80], [40.80, 20.50]
                        ]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": {
                        "name": "Al-Jawf Region",
                        "nameAr": "منطقة الجوف",
                        "capital": "Sakakah",
                        "capitalAr": "سكاكا",
                        "population": "508,475",
                        "area": "100,212 km²",
                        "density": "5 per km²",
                        "description": "Northwestern desert region"
                    },
                    "geometry": {
                        "type": "Polygon",
                        "coordinates": [[
                            [37.50, 31.50], [40.00, 31.50], [40.50, 30.00], [40.00, 29.00],
                            [38.50, 29.00], [37.50, 29.80], [37.00, 30.50], [37.50, 31.50]
                        ]]
                    }
                }
            ]
        };

        let currentLayer = null;

        // Add country border first (bottom layer)
        const countryBorderStyle = {
            fillColor: 'transparent',
            weight: 4,
            opacity: 1,
            color: '#000000',
            dashArray: '',
            fillOpacity: 0
        };

        L.geoJSON(saudiBorder, {
            style: countryBorderStyle,
            interactive: false
        }).addTo(map);

        // Style function for regions
        function style(feature) {
            return {
                fillColor: '#e8f4f8',
                weight: 2,
                opacity: 1,
                color: '#006ba6',
                dashArray: '5, 5',
                fillOpacity: 0.6
            };
        }

        // Highlight feature on hover
        function highlightFeature(e) {
            const layer = e.target;

            layer.setStyle({
                weight: 3,
                color: '#ff6600',
                dashArray: '',
                fillOpacity: 0.7,
                fillColor: '#ffeb99'
            });

            layer.bringToFront();
        }

        // Reset highlight
        function resetHighlight(e) {
            if (currentLayer !== e.target) {
                geojson.resetStyle(e.target);
            }
        }

        // Click handler
        function selectFeature(e) {
            const layer = e.target;
            const props = layer.feature.properties;

            // Reset previous selection
            if (currentLayer) {
                geojson.resetStyle(currentLayer);
            }

            // Highlight current selection
            layer.setStyle({
                fillColor: '#90ee90',
                fillOpacity: 0.8,
                weight: 4,
                color: '#006400',
                dashArray: ''
            });

            currentLayer = layer;

            // Update info panel
            const infoDiv = document.getElementById('region-info');
            infoDiv.classList.add('active');
            infoDiv.innerHTML = `
                <div class="region-name">${props.name}</div>
                <div class="region-name-ar">${props.nameAr}</div>
                
                <div class="detail-item">
                    <div class="detail-label">العاصمة / Capital</div>
                    <div class="detail-value">${props.capitalAr} / ${props.capital}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">عدد السكان / Population</div>
                    <div class="detail-value">${props.population}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">المساحة / Area</div>
                    <div class="detail-value">${props.area}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">الكثافة السكانية / Density</div>
                    <div class="detail-value">${props.density}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">Description</div>
                    <div class="detail-value" style="font-size: 0.95em; font-weight: 400;">${props.description}</div>
                </div>
            `;

            // Zoom to feature
            map.fitBounds(layer.getBounds(), { padding: [50, 50] });
        }

        // Bind events to features
        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight,
                click: selectFeature
            });

            // Bind popup
            layer.bindPopup(`
                <div class="popup-title">${feature.properties.nameAr}</div>
                <strong>${feature.properties.name}</strong><br>
                <em>Click for more details</em>
            `);
        }

        // Add GeoJSON layer for regions
        const geojson = L.geoJSON(saudiRegionsData, {
            style: style,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Fit map to show all regions
        map.fitBounds(geojson.getBounds());

    </script>
</body>
</html>
