<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #222748;
      --accent-color: #d8901d;
      --white: #ffffff;
      --bg-light: #f4f4f9;
    }

    body {
      background-color: var(--bg-light);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .cont {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      margin: 0;
      position: relative;
    }

    .main-wrapper {
      width: 90%;
      max-width: 1100px;
      height: 650px;
      background: var(--white);
      display: flex;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid var(--primary-color);
      position: relative;
    }

    .info-panel {
      flex: 1;
      background-color: var(--primary-color);
      color: var(--white);
      padding: 30px;
      display: flex;
      flex-direction: column;
      border-left: 4px solid var(--accent-color);
      z-index: 1;
      overflow-y: auto;
    }

    .info-panel h2 {
      color: var(--accent-color);
      margin-bottom: 15px;
      font-size: 24px;
      border-bottom: 2px solid rgba(216, 144, 29, 0.3);
      padding-bottom: 10px;
    }

    .map-panel {
      flex: 1.5;
      padding: 20px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* التعديل رقم 3: زر العودة في البوكس الأيمن (اللوحة المعلوماتية) */
    .back-btn-custom {
      position: absolute;
      top: 15px;
      left: 15px; /* يسار البوكس الأيمن يظهر كأنه أعلى يمين لوحة المعلومات في RTL */
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--primary-color);
      border: 1px solid var(--accent-color);
      color: var(--white);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 20;
    }

    .back-btn-custom:hover {
      background-color: var(--accent-color);
    }

    svg#saudiMap {
      width: 100%;
      height: auto;
      max-height: 450px;
      transition: all 0.6s ease;
    }

 /* الحالة الافتراضية للمناطق */
    path {
      fill: #e0e0e0;
      stroke: var(--white);
      stroke-width: 1.5;
      cursor: pointer;
      transition: all 0.3s ease; /* سرعة استجابة اللون */
    }

    /* التعديل: تأثير مرور الماوس (Hover) */
    path:hover:not(.active-region):not(.hidden-region) {
      fill: var(--accent-color); 
      stroke: var(--accent-color);
      stroke-width: 2;
    }

    /* التعديل: لون المنطقة المحددة (عند النقر والتكبير) */
    .active-region {
      fill: var(--accent-color) !important; /* اللون الذهبي */
      stroke: var(--primary-color);
      stroke-width: 2;
      filter: drop-shadow(0px 0px 8px rgba(207, 131, 9, 0.4)); /* توهج ذهبي خفيف */
    }

    /* المناطق غير المحددة تصبح شفافة جداً لتبدو المنطقة الذهبية بارزة */
    .hidden-region {
      opacity: 0.1; 
      pointer-events: none;
    }

    .hidden-element {
      display: none !important;
    }

    /* التعديل رقم 1: تنسيق الجدول */
    .data-table-container {
      width: 100%;
      display: none;
      animation: fadeIn 0.5s;
    }

    .table { color: var(--primary-color); }

    /* التعديل رقم 4: زر خارج البوكس */
    .reports-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #28a745;
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: 0.3s;
    }
    .reports-btn:hover { background-color: #218838; color: white; transform: scale(1.05); }

    .info-actions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn {
      background-color: var(--accent-color);
      color: var(--white);
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      flex: 1 1 45%;
    }
    .hover-map:hover{
      background-color: #218838;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

  <a href="#" class="reports-btn">الاطلاع على التقارير</a>

  <div class="container d-flex justify-content-center">
    <div class="div-image text-center logo" style="width: 150px;">
      <img src="logo2.png" class="img-fluid" alt="logo">
    </div>
  </div>

        </button>

        <div id="defaultContent">
          <h2>مناطق المملكة</h2>
          <p style="opacity: 0.7;">اضغط على أي منطقة في الخريطة لعرض تفاصيلها هنا.</p>
        </div>

        <div id="regionDetail" style="display:none; height: 100%; flex-direction: column;">
          <h2 id="regionName">اسم المنطقة</h2>

            <button class="action-btn" onclick="showTable('الهوائيات')">الهوائيات</button>
            <button class="action-btn" onclick="showTable('الأجهزة وملحقاتها')">الأجهزة وملحقاتها</button>
            <button class="action-btn" onclick="showTable('السنترالات')">السنترالات</button>
          </div>
        </div>

        <div id="dataTableContainer" class="data-table-container">

              <tr>
                <th>النوع</th>
                <th>العدد</th>
                <th>الحالة</th>
              </tr>
            </thead>

              </tbody>

  <script>
    const svgMap = document.getElementById('saudiMap');
    const resetMapBtn = document.getElementById('resetMapBtn');
    const mapTitle = document.getElementById('mapTitle');
    const dataTableContainer = document.getElementById('dataTableContainer');
    const tableBody = document.getElementById('tableBody');
    const originalViewBox = svgMap.getAttribute('viewBox');
    const paths = document.querySelectorAll('path');

    // التعديل رقم 1: وظيفة إظهار الجدول
    function showTable(type) {
      // إخفاء الخريطة
      svgMap.classList.add('hidden-element');
      // إظهار حاوية الجدول
      dataTableContainer.style.display = 'block';
      // تغيير العنوان
      mapTitle.innerText = `بيانات ${type} - ${document.getElementById('regionName').innerText}`;
      
      // مثال لبيانات وهمية
      const mockData = [
        { type: `${type} - طراز A`, count: 15, status: 'نشط' },
        { type: `${type} - طراز B`, count: 7, status: 'صيانة' },
        { type: `${type} - طراز C`, count: 22, status: 'نشط' }
      ];

      tableBody.innerHTML = mockData.map(item => `
        <tr>
          <td>${item.type}</td>
          <td>${item.count}</td>
          <td><span class="badge ${item.status === 'نشط' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
        </tr>
      `).join('');
    }

    paths.forEach(path => {
      path.addEventListener('click', function () {
        const bbox = this.getBBox();
        const padding = 40;
        const newVB = `${bbox.x - padding} ${bbox.y - padding} ${bbox.width + padding * 4} ${bbox.height + padding * 2}`;

        svgMap.setAttribute('viewBox', newVB);
        
        paths.forEach(p => {
          p.classList.remove('active-region');
          if (p !== this) p.classList.add('hidden-region');
          else p.classList.add('active-region');
        });

        // التعديل رقم 2: تغيير العنوان لاسم المنطقة
        mapTitle.innerText = this.getAttribute('name');

        document.getElementById('defaultContent').style.display = 'none';
        document.getElementById('regionDetail').style.display = 'flex';
        document.getElementById('regionName').innerText = this.getAttribute('name');

        resetMapBtn.style.display = 'flex';
      });
    });

    resetMapBtn.addEventListener('click', () => {
      // إعادة الحالة الأصلية
      svgMap.setAttribute('viewBox', originalViewBox);
      svgMap.classList.remove('hidden-element');
      dataTableContainer.style.display = 'none';
      
      // التعديل رقم 2: إعادة العنوان الأصلي
      mapTitle.innerText = "خريطة المناطق الإدارية";

      paths.forEach(p => p.classList.remove('hidden-region', 'active-region'));
      document.getElementById('defaultContent').style.display = 'block';
      document.getElementById('regionDetail').style.display = 'none';
      resetMapBtn.style.display = 'none';
    });
  </script>
