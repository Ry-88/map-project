<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

  <style>
    :root {
      --primary-color: #222748;
      --accent-color: #d8901d;
      --white: #ffffff;
      --bg-light: #f4f4f9;
    }

    body {
      background-color: var(--bg-light);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    }

    .cont {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      margin: 0;
    }

    .main-wrapper {
      width: 90%;
      max-width: 1100px;
      height: 650px;
      /* زدت الارتفاع قليلاً لاستيعاب الصورة */
      background: var(--white);
      display: flex;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid var(--primary-color);
    }

    .info-panel {
      flex: 1;
      background-color: var(--primary-color);
      color: var(--white);
      padding: 30px;
      display: flex;
      flex-direction: column;
      border-left: 4px solid var(--accent-color);
      z-index: 1;
      overflow-y: auto;
    }

    .info-panel h2 {
      color: var(--accent-color);
      margin-bottom: 15px;
      font-size: 24px;
      border-bottom: 2px solid rgba(216, 144, 29, 0.3);
      padding-bottom: 10px;
    }

    /* تنسيق الصورة المضافة */
    #regionImage {
      width: 200px;
      max-height: 200px;
      object-fit: fill;
      border-radius: 8px;
      margin-top: 15px;
      border: 2px solid var(--accent-color);
      display: none;
    }

    .map-panel {
      flex: 1.5;
      padding: 20px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .back-btn-custom {
      position: absolute;
      top: 20px;
      right: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      background: #f0f0f5;
      border: none;
      color: var(--primary-color);
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0.5rem;
      border-radius: 50px;
      z-index: 10;
    }

    .back-btn-custom svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--primary-color);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .back-btn-custom:hover {
      background-color: var(--accent-color);
      color: #fff;
    }

    svg#saudiMap {
      width: 100%;
      height: auto;
      max-height: 450px;
      transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    path {
      fill: #e0e0e0;
      stroke: var(--white);
      stroke-width: 1.5;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .is-zoomed path {
      cursor: default !important;
    }

    /* تأكيد تفعيل النقر على الأيقونات */
    #riyadhTowerIcon,
    #faisaliahTowerIcon {
      cursor: pointer !important;
      pointer-events: all !important;
    }

    .active-region {
      fill: var(--accent-color) !important;
      stroke: var(--primary-color);
      stroke-width: 2;
    }

    .hidden-region {
      opacity: 0;
      pointer-events: none;
    }

    .info-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .action-btn {
      background-color: var(--accent-color);
      color: var(--white);
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .action-btn.active {
      background-color: var(--white);
      color: var(--primary-color);
    }

    .div-image {
      justify-content: center;
      align-items: center;
      width: 30vh;
      height: 30vh;
    }

    .image {
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-bottom: -50px;
      margin-top: -3rem;
    }
  </style>
</head>

    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script>
    fetch("navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });

    const regionData = {
      SA01: "منطقة الرياض هي عاصمة المملكة والمركز السياسي والاقتصادي.",
      SA04: "المنطقة الشرقية هي أكبر مناطق المملكة مساحة وتعتبر مركز الطاقة."
      // أضف بقية بيانات المناطق هنا كما كانت لديك
    };

    // روابط الصور (استبدلها بروابط صورك الحقيقية)
    const towerImages = {
      riyadh: "r.png",
      faisaliah: "logo.png"
    };

    const svgMap = document.getElementById('saudiMap');
    const resetMapBtn = document.getElementById('resetMapBtn');
    const originalViewBox = svgMap.getAttribute('viewBox');
    const paths = document.querySelectorAll('path');
    const towersBtn = document.getElementById('towersBtn');
    const regionImage = document.getElementById('regionImage');

    // الأيقونات
    const riyadhTowerIcon = document.getElementById('riyadhTowerIcon');
    const faisaliahTowerIcon = document.getElementById('faisaliahTowerIcon');

    let currentActiveRegion = null;
    let isTowersBtnActive = false;

    function checkTowerVisibility() {
      const isVisible = (currentActiveRegion === 'SA01' && isTowersBtnActive);
      riyadhTowerIcon.style.display = isVisible ? 'block' : 'none';
      faisaliahTowerIcon.style.display = isVisible ? 'block' : 'none';
    }

    towersBtn.addEventListener('click', () => {
      isTowersBtnActive = !isTowersBtnActive;
      towersBtn.classList.toggle('active', isTowersBtnActive);
      checkTowerVisibility();
    });

    // حدث النقر على برج الرياض (النقطة 1)
    riyadhTowerIcon.addEventListener('click', (e) => {

      e.stopPropagation();
      regionImage.src = towerImages.riyadh;
      document.getElementById('regionName').innerText = "برج الرياض";
      document.getElementById('regionDescription').innerText = "أحد المعالم الرئيسية للاتصالات في قلب العاصمة.";
      regionImage.style.display = "block";

      // ... الكود السابق (الصورة والوصف) ...
    });

    // حدث النقر على برج الفيصلية (النقطة 2)
    faisaliahTowerIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('regionName').innerText = "برج الفيصلية";
      document.getElementById('regionDescription').innerText = "تحفة معمارية متميزة في الرياض، يشتهر بالكرة الزجاجية في قمته.";
      regionImage.src = towerImages.faisaliah;
      regionImage.style.display = "block";
      const linkBtn = document.getElementById('moreInfoLink');
      linkBtn.href = "https://www.alfaisaliah.com"; // الرابط الخاص بالفيصلية
      linkBtn.style.display = "block";
    });

    paths.forEach(path => {
      path.addEventListener('click', function () {
        const bbox = this.getBBox();
        const padding = 40;
        const newVB = `${bbox.x - padding} ${bbox.y - padding} ${bbox.width + padding * 4} ${bbox.height + padding * 2}`;

        svgMap.setAttribute('viewBox', newVB);
        svgMap.classList.add('is-zoomed');

        paths.forEach(p => {
          p.classList.remove('active-region');
          if (p !== this) p.classList.add('hidden-region');
          else p.classList.add('active-region');
        });

        currentActiveRegion = this.id;
        document.getElementById('defaultContent').style.display = 'none';
        document.getElementById('regionDetail').style.display = 'flex';

        // إعادة تصفير الصورة عند الانتقال لمنطقة جديدة
        regionImage.style.display = "none";

        document.getElementById('regionName').innerText = this.getAttribute('name');
        document.getElementById('regionDescription').innerText = regionData[this.id] || "لا توجد تفاصيل.";

        resetMapBtn.style.display = 'flex';
        checkTowerVisibility();
      });
    });

    resetMapBtn.addEventListener('click', () => {
      svgMap.setAttribute('viewBox', originalViewBox);
      svgMap.classList.remove('is-zoomed');
      paths.forEach(p => p.classList.remove('hidden-region', 'active-region'));
      document.getElementById('defaultContent').style.display = 'block';
      document.getElementById('regionDetail').style.display = 'none';
      resetMapBtn.style.display = 'none';
      regionImage.style.display = "none"; // إخفاء الصورة عند العودة
      currentActiveRegion = null;
      checkTowerVisibility();
    });


    // في حدث النقر على برج الفيصلية

  </script>

  <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
