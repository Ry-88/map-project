<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #222748;
            --accent-color: #d8901d;
            --white: #ffffff;
            --bg-light: #f4f4f9;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* زر التقارير الخارجي */
        .reports-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .main-wrapper {
            width: 95%;
            max-width: 1200px;
            height: 650px;
            background: var(--white);
            display: flex;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--primary-color);
            margin: 0 auto;
        }

        /* اللوحة اليمنى */
        .info-panel {
            flex: 0 0 350px; /* عرض ثابت للوحة المعلومات */
            background-color: var(--primary-color);
            color: var(--white);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-left: 4px solid var(--accent-color);
        }

        .back-btn-container { height: 50px; margin-bottom: 10px; }
        
        .back-btn-custom {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
        }

        .info-panel h2 {
            color: var(--accent-color);
            border-bottom: 2px solid rgba(216, 144, 29, 0.3);
            padding-bottom: 10px;
            font-size: 24px;
        }

        /* اللوحة اليسرى */
        .map-panel {
            flex: 1;
            padding: 20px;
            background: var(--white);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; /* لمنع خروج الجدول عن الحدود */
        }

        /* الجدول مع السكرول */
        .data-table-container {
        width: 100%;
        max-height: 500px;
        overflow: hidden; /* إلغاء السكرول */
        display: none;
        border-radius: 8px;
        border: 1px solid #eee;
        background: #fff;
    }

    .table {
        width: 100% !important; /* الجدول يأخذ عرض الحاوية بالضبط */
        margin-bottom: 0;
        table-layout: fixed; /* توزيع الأعمدة بالتساوي ومنع التمدد */
    }

    .table thead th {
        background-color: var(--primary-color) !important;
        color: white !important;
        font-size: 11px; /* تصغير الخط ليتناسب مع المساحة */
        padding: 8px 4px;
        text-align: center;
        vertical-align: middle;
    }

    .table td {
        font-size: 11px;
        padding: 6px 2px;
        text-align: center;
        vertical-align: middle;
        word-wrap: break-word; /* كسر الكلام الطويل ليبقى داخل الخلية */
        border-bottom: 1px solid #f1f1f1;
    }

    /* تحسين شكل الأزرار لتكون أنحف وأرتب */
    .info-actions {
        margin-top: auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .action-btn {
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 6px 2px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: bold;
    }
        /* الأزرار */
        .info-actions {
            margin-top: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .img-fluid{
          height: 100%;
          
        }

        .action-btn:hover { filter: brightness(1.2); }

        /* الخريطة */
        svg#saudiMap { width: 100%; height: auto; max-height: 450px; transition: 0.5s; }
        path { fill: #e0e0e0; stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: 0.3s; }
        .active-region { fill: var(--accent-color) !important; }
        .hidden-region { opacity: 0.1; pointer-events: none; }
        .hidden-element { display: none !important; }
    </style>
</head>

    <script>
        const regionalDataStore = {
            SA01: { // الرياض
                exchanges: [{ type: "ALCATEL OXE", sw: "Release R12.2", analog: "50", digital: "1272", direct: "38", ac: "1", batt: "1", ups: 1, ext: "50", int: "6000", cap: "2600" },
                            {type: "ALCATEL OXE", sw: "Release R-9", analog: "126", digital: "256", direct: "5", ac: "1", batt: "1", ups: "احتياج", ext: "50", int: "5000", cap: "600" },
                             {type: "ALCATEL OXE", sw: "Release R-9", analog: "126", digital: "256", direct: "5", ac: "1", batt: "1", ups: "احتياج", ext: "50", int: "5000", cap: "600" }],
                repeaters: [{ item: "محطة الدرعية", count: 2, loc: "الدرعية" }]
            },
            SA04: { // الشرقية
                exchanges: [{ type: "هواوي EX", sw: "v8.0", analog: "80", digital: "40", direct: "15", ac: "3", batt: "6", ups: "موجود", ext: "200", int: "100", cap: "400" }]
            }
        };

        const svgMap = document.getElementById('saudiMap');
        const resetMapBtn = document.getElementById('resetMapBtn');
        const mapTitle = document.getElementById('mapTitle');
        const dataTableContainer = document.getElementById('dataTableContainer');
        const tableBody = document.getElementById('tableBody');
        const tableHeader = document.getElementById('tableHeader');
        const paths = document.querySelectorAll('path');
        let currentRegionId = null;

        function loadRegionalData(category) {
            if (!currentRegionId) return;
            const data = regionalDataStore[currentRegionId]?.[category] || [];
            
            svgMap.classList.add('hidden-element');
            dataTableContainer.style.display = 'block';

            if (category === 'exchanges') {
                tableHeader.innerHTML = `<tr>
                    <th>النوع</th><th>الإصدار</th><th>تماثلية</th><th>رقمية</th><th>مباشرة</th>
                    <th>مكيفات</th><th>بطاريات</th><th>UPS</th><th>سعة خارجية</th><th>سعة داخلية</th><th>سعة السنترال</th>
                </tr>`;
                tableBody.innerHTML = data.length ? data.map(row => `<tr>
                    <td>${row.type}</td><td>${row.sw}</td><td>${row.analog}</td><td>${row.digital}</td><td>${row.direct}</td>
                    <td>${row.ac}</td><td>${row.batt}</td><td>${row.ups}</td><td>${row.ext}</td><td>${row.int}</td><td>${row.cap}</td>
                </tr>`).join('') : '<tr><td colspan="11" class="text-center">لا توجد بيانات</td></tr>';
            } else {
                tableHeader.innerHTML = `<tr><th>النوع</th><th>العدد</th><th>الموقع</th></tr>`;
                tableBody.innerHTML = data.length ? data.map(row => `<tr><td>${row.item}</td><td>${row.count}</td><td>${row.loc}</td></tr>`).join('') : '<tr><td colspan="3" class="text-center">لا توجد بيانات</td></tr>';
            }
        }

        paths.forEach(path => {
            path.addEventListener('click', function () {
                const bbox = this.getBBox();
                currentRegionId = this.id;
                svgMap.setAttribute('viewBox', `${bbox.x - 30} ${bbox.y - 30} ${bbox.width + 60} ${bbox.height + 60}`);
                paths.forEach(p => { p.classList.add('hidden-region'); p.classList.remove('active-region'); });
                this.classList.remove('hidden-region'); this.classList.add('active-region');
                
                mapTitle.innerText = this.getAttribute('name');
                document.getElementById('defaultContent').style.display = 'none';
                document.getElementById('regionDetail').style.display = 'flex';
                document.getElementById('regionName').innerText = this.getAttribute('name');
                resetMapBtn.style.display = 'flex';
                dataTableContainer.style.display = 'none';
                svgMap.classList.remove('hidden-element');
            });
        });

        resetMapBtn.addEventListener('click', () => {
            svgMap.setAttribute('viewBox', "0 0 1000 824");
            svgMap.classList.remove('hidden-element');
            dataTableContainer.style.display = 'none';
            mapTitle.innerText = "خريطة المناطق الإدارية";
            paths.forEach(p => p.classList.remove('hidden-region', 'active-region'));
            document.getElementById('defaultContent').style.display = 'block';
            document.getElementById('regionDetail').style.display = 'none';
            resetMapBtn.style.display = 'none';
        });
    </script>
</body>
