<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
    :root {
        --primary-color: #222748;   /* اللون الأساسي */
        --accent-color: #d8901d;    /* لمسات خفيفة */
        --white: #ffffff;
        --bg-light: #f4f4f9;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-light);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    /* المستطيل الرئيسي في وسط الصفحة */
    .main-wrapper {
        width: 90%;
        max-width: 1100px;
        height: 600px;
        background: var(--white);
        display: flex;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        border-radius: 15px;
        overflow: hidden;
        border: 2px solid var(--primary-color);
    }

    /* الجهة اليسرى: معلومات المنطقة */
    .info-panel {
        flex: 1;
        background-color: var(--primary-color);
        color: var(--white);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 4px solid var(--accent-color);
        position: relative;
    }

    .info-panel h2 {
        color: var(--accent-color);
        margin-bottom: 20px;
        font-size: 28px;
        border-bottom: 2px solid rgba(216, 144, 29, 0.3);
        padding-bottom: 10px;
    }

    .info-content p {
        line-height: 1.8;
        font-size: 18px;
    }

    .placeholder-text {
        opacity: 0.6;
        font-style: italic;
    }

    /* زر العودة للخريطة الكاملة */
    .reset-btn {
        margin-top: 30px;
        padding: 12px 20px;
        background-color: var(--accent-color);
        color: var(--white);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s ease;
        display: none;
        align-self: flex-start;
    }

    .reset-btn:hover {
        background-color: #b57817;
    }

    /* الجهة اليمنى: الخريطة */
    .map-panel {
        flex: 1.5;
        padding: 20px;
        background: var(--white);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .map-panel h3 {
        color: var(--primary-color);
        margin-bottom: 10px;
    }

    svg {
        width: 100%;
        height: auto;
        max-height: 450px;
        /* Animation for smooth zooming */
        transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    path {
        fill: #e0e0e0; /* لون افتراضي للمناطق */
        stroke: var(--white);
        stroke-width: 1.5;
        cursor: pointer;
        transition: all 0.4s ease;
    }

    path:hover:not(.hidden-region) {
        fill: var(--accent-color) !important;
        filter: brightness(1.1);
    }

    .active-region {
        fill: var(--accent-color) !important;
        stroke: var(--primary-color);
        stroke-width: 2;
    }

    /* كلاس لإخفاء المناطق غير المحددة */
    .hidden-region {
        opacity: 0;
        pointer-events: none;
    }

    /* التجاوب مع الشاشات الصغيرة */
    @media (max-width: 768px) {
        .main-wrapper {
            flex-direction: column;
            height: auto;
        }
        .info-panel { order: 2; }
        .map-panel { order: 1; }
    }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="info-panel" id="infoPanel">
        <div id="defaultContent">
            <h2>مناطق المملكة</h2>
            <p class="placeholder-text">اضغط على أي منطقة في الخريطة لعرض تفاصيلها هنا.</p>
        </div>
        <div id="regionDetail" style="display:none;">
            <h2 id="regionName">اسم المنطقة</h2>
            <p id="regionDescription">تفاصيل ومعلومات عن المنطقة المحددة تظهر هنا بشكل تلقائي عند التفاعل مع الخريطة.</p>
            <button id="resetMapBtn" class="reset-btn">العودة للخريطة</button>
        </div>
    </div>

<script>
    // بيانات افتراضية للمناطق
    const regionData = {
        SA01: "منطقة الرياض هي عاصمة المملكة العربية السعودية، وتعتبر المركز السياسي والاقتصادي الرئيسي.",
        SA02: "منطقة مكة المكرمة تضم المسجد الحرام والكعبة المشرفة، وهي قبلة المسلمين في جميع أنحاء العالم.",
        SA03: "المدينة المنورة هي طيبة الطيبة، وتضم المسجد النبوي الشريف وقبر الرسول صلى الله عليه وسلم.",
        SA04: "المنطقة الشرقية هي أكبر مناطق المملكة مساحة، وتعتبر المركز الرئيسي لصناعة النفط والغاز.",
        SA05: "منطقة القصيم تشتهر بالزراعة، وخاصة زراعة النخيل وإنتاج التمور الفاخرة.",
        SA06: "منطقة حائل تشتهر بجبال أجا وسلمى وبالكرم الحاتمي الأصيل.",
        SA07: "منطقة تبوك بوابة الشمال، وتتميز بتنوع تضاريسها ومشروع نيوم العالمي.",
        SA08: "منطقة الحدود الشمالية تتميز بموقعها الاستراتيجي وثرواتها المعدنية الكبيرة.",
        SA09: "منطقة جازان تقع في الجنوب الغربي، وتشتهر بالزراعة والجزر السياحية مثل فرسان.",
        SA10: "منطقة نجران تشتهر بآثارها التاريخية مثل الأخدود، وبعراقة تراثها العمراني.",
        SA11: "منطقة الباحة لؤلؤة الجبال، وتتميز بطقسها المعتدل وغاباتها الكثيفة.",
        SA12: "منطقة الجوف تعتبر سلة غذاء المملكة وتشتهر بزراعة الزيتون.",
        SA14: "منطقة عسير وجهة سياحية جبلية، وتتميز بمنتزه السودة والأجواء الماطرة صيفاً."
    };

    const paths = document.querySelectorAll('path');
    const svgMap = document.getElementById('saudiMap');
    const originalViewBox = svgMap.getAttribute('viewBox'); // حفظ الأبعاد الأصلية

    const regionDetail = document.getElementById('regionDetail');
    const defaultContent = document.getElementById('defaultContent');
    const regionNameLabel = document.getElementById('regionName');
    const regionDescriptionLabel = document.getElementById('regionDescription');
    const resetMapBtn = document.getElementById('resetMapBtn');

    paths.forEach(path => {
        path.addEventListener('click', function() {
            const clickedPath = this;

            // 1. حساب أبعاد المنطقة المحددة للتقريب (Zoom in)
            const bbox = clickedPath.getBBox();
            const padding = 20; // نسبة التكبير حول المنطقة
            const newViewBox = `${bbox.x - padding} ${bbox.y - padding} ${bbox.width + padding * 2} ${bbox.height + padding * 2}`;
            svgMap.setAttribute('viewBox', newViewBox);

            // 2. إخفاء جميع المناطق الأخرى وإظهار المنطقة المحددة فقط
            paths.forEach(p => {
                p.classList.remove('active-region');
                if (p !== clickedPath) {
                    p.classList.add('hidden-region');
                } else {
                    p.classList.remove('hidden-region');
                    p.classList.add('active-region');
                }
            });

            // 3. تحديث لوحة المعلومات
            const id = clickedPath.id;
            const name = clickedPath.getAttribute('name');
            const description = regionData[id] || "لا توجد معلومات إضافية متوفرة حالياً لهذه المنطقة.";

            defaultContent.style.display = 'none';
            regionDetail.style.display = 'block';
            resetMapBtn.style.display = 'block'; // إظهار زر العودة
            
            regionNameLabel.innerText = name;
            regionDescriptionLabel.innerText = description;
            
            // تأثير حركة بسيط عند التغيير
            regionDetail.style.animation = 'none';
            regionDetail.offsetHeight; /* trigger reflow */
            regionDetail.style.animation = 'fadeIn 0.5s';
        });
    });

    // 4. وظيفة زر العودة للخريطة الكاملة (Reset)
    resetMapBtn.addEventListener('click', () => {
        // إعادة الأبعاد الأصلية للخريطة
        svgMap.setAttribute('viewBox', originalViewBox);
        
        // إظهار جميع المناطق وإزالة التحديد
        paths.forEach(p => {
            p.classList.remove('hidden-region');
            p.classList.remove('active-region');
        });

        // إعادة لوحة المعلومات لحالتها الافتراضية
        defaultContent.style.display = 'block';
        regionDetail.style.display = 'none';
        resetMapBtn.style.display = 'none';
    });
</script>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
