<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

     <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


</head>
<body>
    <div id="map"></div>



   <script>
    var map = L.map('map').setView([21.4858, 39.1925], 10);

    /* 🔥 الخريطة المودرن بدون أسماء */
    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; Stadia Maps &copy; OpenStreetMap',
        maxZoom: 20
    }).addTo(map);

    L.marker([21.5433, 39.1728])
        .addTo(map)
        .bindPopup("<b>موقع تجريبي</b><br>تفاصيل المكان");
</script>
</body>
</html>
